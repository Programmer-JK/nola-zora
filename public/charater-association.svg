<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="pinkNeon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF529A" />
      <stop offset="100%" stop-color="#FF1493" />
    </linearGradient>
    
    <linearGradient id="cardGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB7DA" />
      <stop offset="100%" stop-color="#FF529A" />
    </linearGradient>

    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#FF1493" flood-opacity="0.4"/>
    </filter>
  </defs>

  <g filter="url(#neonGlow)">
    
    <rect x="90" y="110" width="70" height="100" rx="8" fill="url(#cardGlow)" transform="rotate(-15 125 160)" opacity="0.9"/>
    <circle cx="115" cy="140" r="12" fill="#FFFFFF" transform="rotate(-15 125 160)" opacity="0.8"/>
    <rect x="105" y="165" width="40" height="6" rx="3" fill="#FFFFFF" transform="rotate(-15 125 160)" opacity="0.8"/>

    <rect x="340" y="80" width="70" height="100" rx="8" fill="url(#cardGlow)" transform="rotate(20 375 130)" opacity="0.8"/>
    <polygon points="375,105 365,125 385,125" fill="#FFFFFF" transform="rotate(20 375 130)" opacity="0.8"/>
    
    <rect x="350" y="290" width="70" height="100" rx="8" fill="url(#cardGlow)" transform="rotate(-10 385 340)" opacity="0.95"/>
    <rect x="365" y="315" width="40" height="30" rx="4" fill="#FFFFFF" transform="rotate(-10 385 340)" opacity="0.7"/>

    <rect x="80" y="300" width="70" height="100" rx="8" fill="url(#cardGlow)" transform="rotate(25 115 350)" opacity="0.85"/>

    <path d="M 210,160 
