    <circle cx="256" cy="365" r="24" fill="url(#pinkNeon)" />
    
    <path d="M 180,240 L 190,250 L 180,260 L 170,250 Z" fill="#FFB7DA" />
    <path d="M 330,220 L 336,226 L 330,232 L 324,226 Z" fill="#FFB7DA" />
